# Development overrides
# Usage: docker compose -f compose.yml -f compose.dev.yml up
#
# Starts only Directus + PostgreSQL with exposed ports.
# SvelteKit frontend runs locally via `npm run dev` (not in Docker).

services:
  postgres:
    ports:
      - "5432:5432"

  directus:
    ports:
      - "8055:8055"
    environment:
      PUBLIC_URL: http://localhost:8055

  # Frontend and Caddy are not needed in dev
  frontend:
    profiles:
      - production

  caddy:
    profiles:
      - production
