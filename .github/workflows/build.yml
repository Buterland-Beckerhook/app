name: Build & push image

# Builds the Phoenix release image and pushes it to GHCR.
# The server only pulls the image afterwards (docker compose pull) — it never builds.
on:
  push:
    branches: [feat/phoenix-rewrite]
    paths:
      - "app/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

# Deny-all by default; the build job re-grants exactly what it needs.
permissions: {}

# Cancel a superseded build on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # github.repository == "Buterland-Beckerhook/app"; the metadata-action lowercases
  # the name to ghcr.io/buterland-beckerhook/app.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    # Multi-arch image: linux/amd64 + linux/arm64 (the prod server is arm64/v8,
    # amd64 keeps local/dev pulls working). ubuntu-latest is an amd64 runner, so
    # arm64 is emulated via QEMU (works everywhere, but the arm64 leg is slower).
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      # Needed to build the arm64 leg on the amd64 runner via emulation.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=beta
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ./app
          file: ./app/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
