# Production/Beta stack for the Phoenix rewrite: Postgres + Phoenix (release) + Caddy.
# The image is built by GitHub Actions and pushed to GHCR — the server only pulls it.
# Run: docker compose --env-file .env up -d
# Update: docker compose --env-file .env pull phoenix && docker compose --env-file .env up -d phoenix
#
# The same file serves Beta and Prod; the target is selected purely via .env
# (IMAGE, SITE_HOST, CADDYFILE, PHX_HOST, BASIC_AUTH_*). See .env.example.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bbh
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  phoenix:
    image: ${IMAGE:-ghcr.io/buterland-beckerhook/app:beta}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Run migrations, then start the server.
    command: ["/bin/sh", "-c", "/app/bin/migrate && /app/bin/server"]
    # Give Bandit time to drain in-flight requests before SIGKILL.
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4000/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      DATABASE_URL: ecto://${DB_USER}:${DB_PASSWORD}@postgres/bbh
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      PHX_HOST: ${PHX_HOST}
      PHX_SERVER: "true"
      UPLOADS_DIR: /data/uploads
      MEDIA_CACHE_DIR: /data/uploads_cache
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      ALTCHA_HMAC_KEY: ${ALTCHA_HMAC_KEY}
      SMTP_RELAY: ${SMTP_RELAY}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      CONTACT_RECIPIENT: ${CONTACT_RECIPIENT}
      CONTACT_SENDER: ${CONTACT_SENDER}
      MATOMO_URL: ${MATOMO_URL}
      MATOMO_SITE_ID: ${MATOMO_SITE_ID}
    volumes:
      - uploads:/data

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on: [phoenix]
    ports:
      - "80:80"
      - "443:443"
    # Caddy resolves the {$...} placeholders in the Caddyfile from these env vars.
    environment:
      SITE_HOST: ${SITE_HOST:-buterland-beckerhook.de}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-}
      BASIC_AUTH_HASH: ${BASIC_AUTH_HASH:-}
    volumes:
      # Prod uses ./Caddyfile (default); Beta sets CADDYFILE=./Caddyfile.beta in .env.
      - ${CADDYFILE:-./Caddyfile}:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  uploads:
  caddy_data:
  caddy_config:
